version: "3.9"

# Production compose with Caddy for automatic HTTPS
# Usage:
#   DOMAIN=gas.yourdomain.com ACME_EMAIL=you@email.com docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gas-backend
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET env var}
    volumes:
      - ./_data:/app/_data:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/gas/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: gas-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
